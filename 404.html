<!DOCTYPE html>
<!-- ATENȚIE: pagina 404 e servită de GitHub Pages de la ORICE adresă greșită,
     deci toate căile de aici sunt ABSOLUTE, cu numele depozitului inclus.
     Dacă redenumești depozitul sau treci pe domeniu propriu, actualizează
     prefixul /atelier-gabriela/ din acest fișier (4 locuri). -->
<html lang="ro">
<head>
<script>
document.documentElement.classList.add("js");
/* Plasă de siguranță: dacă stil.css nu e lângă index.html (fișier deschis singur,
   în afara folderului complet), pagina explică singură ce lipsește. */
window.addEventListener("load", function () {
  if (getComputedStyle(document.documentElement).getPropertyValue("--ivoriu").trim()) return;
  var b = document.createElement("div");
  b.textContent = "Tema site-ului nu s-a găsit: fișierul stil.css trebuie să stea în același folder cu index.html. Dezarhivează pachetul complet și deschide index.html din folderul rezultat — sau vezi site-ul publicat online.";
  b.style.cssText = "position:sticky;top:0;z-index:99;background:#7C2D2D;color:#fff;padding:14px 18px;font:600 15px/1.5 system-ui,sans-serif;text-align:center";
  document.body.prepend(b);
});
</script>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-FGImOa8qeWEjeV7JdCKma0QBQ3QqLyJdYEtwTBm65w0='; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src https://www.google.com https://maps.google.com https://consent.google.com; base-uri 'self'; form-action 'none'; object-src 'none'">
